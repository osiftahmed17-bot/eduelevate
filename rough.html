<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduElevate Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ===== BODY WITH BACKGROUND IMAGE ===== */

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: url("slinglogo.jpeg") no-repeat center center/cover;
    position:relative;
}

/* Dark overlay for readability */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    z-index:0;
}

/* Dark Mode Overlay */
body.dark::before{
    background:rgba(0,0,0,0.75);
}

/* ===== DARK TOGGLE BUTTON ===== */

.dark-toggle{
    position:fixed;
    top:20px;
    right:20px;
    z-index:999;
    cursor:pointer;
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    font-size:20px;
}

body.dark .dark-toggle{
    background:#222;
    color:white;
}

/* ===== CONTAINER (GLASS EFFECT) ===== */

.container{
    position:relative;
    z-index:1;

    width:90%;
    max-width:1200px;
    min-height:85vh;
    padding:40px;
    border-radius:20px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* ===== LOGO ===== */

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:160px;
    max-width:100%;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
    border-radius:50%;
}

/* ===== FORM ===== */

h2{
    text-align:center;
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px;
}

.form-group{
    position:relative;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.15);
    color:white;
    outline:none;
}

.form-group label{
    position:absolute;
    left:12px;
    top:12px;
    font-size:14px;
    color:#eee;
    pointer-events:none;
    transition:0.3s;
}

.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label,
.form-group textarea:focus + label,
.form-group textarea:not(:placeholder-shown) + label{
    top:-8px;
    left:8px;
    font-size:12px;
    color:#fff;
}

/* ===== PASSWORD ===== */

.password-wrapper{
    position:relative;
}

.toggle-password{
    position:absolute;
    right:12px;
    top:12px;
    cursor:pointer;
}

/* ===== STRENGTH BAR ===== */

.strength{
    height:6px;
    border-radius:5px;
    margin-top:5px;
    background:rgba(255,255,255,0.3);
    overflow:hidden;
}

.strength div{
    height:100%;
    width:0%;
    transition:0.4s;
}

/* ===== GENDER ===== */

.gender{
    grid-column: span 2;
    display:flex;
    justify-content:center;
    gap:40px;
}

/* ===== FULL WIDTH ===== */

.full{
    grid-column: span 2;
}

/* ===== BUTTON ===== */

button{
    grid-column: span 2;
    padding:14px;
    border:none;
    border-radius:30px;
    background: linear-gradient(45deg,#1e3c72,#f7971e);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="dark-toggle" onclick="toggleDark()">🌙</div>

<div class="container">

<div class="logo">
    <img src="slinglogo.jpeg" alt="EduElevate Logo">
</div>

<h2>User Login</h2>

<form class="form-grid">

<div class="form-group">
    <input type="text" required placeholder=" ">
    <label>Username</label>
</div>

<div class="form-group password-wrapper">
    <input type="password" id="password" required placeholder=" " onkeyup="checkStrength()">
    <label>Password</label>
    <span class="toggle-password" onclick="togglePassword()">👁️</span>

    <div class="strength">
        <div id="strength-bar"></div>
    </div>
</div>

<div class="form-group">
    <input type="number" required placeholder=" ">
    <label>Age</label>
</div>

<div class="form-group">
    <select required>
        <option value="">Select Course</option>
        <option>B.Tech</option>
        <option>BCA</option>
        <option>B.Sc</option>
        <option>MBA</option>
        <option>M.Tech</option>
    </select>
</div>

<div class="gender">
    <label><input type="radio" name="gender"> Male</label>
    <label><input type="radio" name="gender"> Female</label>
    <label><input type="radio" name="gender"> Other</label>
</div>

<div class="form-group full">
    <textarea rows="3" required placeholder=" "></textarea>
    <label>Address</label>
</div>

<button type="submit">Login 🚀</button>

</form>

</div>

<script>

function togglePassword(){
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function checkStrength(){
    let pass = document.getElementById("password").value;
    let bar = document.getElementById("strength-bar");

    let strength = 0;

    if(pass.length > 5) strength++;
    if(pass.match(/[A-Z]/)) strength++;
    if(pass.match(/[0-9]/)) strength++;
    if(pass.match(/[^A-Za-z0-9]/)) strength++;

    if(strength <= 1){
        bar.style.width = "25%";
        bar.style.background = "red";
    }
    else if(strength == 2){
        bar.style.width = "50%";
        bar.style.background = "orange";
    }
    else if(strength == 3){
        bar.style.width = "75%";
        bar.style.background = "yellowgreen";
    }
    else{
        bar.style.width = "100%";
        bar.style.background = "lime";
    }
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
