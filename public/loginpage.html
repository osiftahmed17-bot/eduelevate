<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduElevate Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#1e3c72;
    --secondary:#f7971e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#1e3c72,#2a5298,#f7971e);
    background-size:300% 300%;
    animation: gradientMove 12s infinite alternate;
}

@keyframes gradientMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

.container{
    width:90%;
    max-width:900px;
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:white;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px;
}

.form-group{
    position:relative;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid rgba(224, 217, 217, 0.5);
    background:rgba(255,255,255,0.15);
    color:black;
    outline:none;
}

.form-group label{
    position:absolute;
    left:12px;
    top:12px;
    font-size:14px;
    color:#eee;
    pointer-events:none;
    transition:0.3s;
}

.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label,
.form-group textarea:focus + label,
.form-group textarea:not(:placeholder-shown) + label{
    top:-8px;
    left:8px;
    font-size:12px;
    color:#fff;
}

.gender{
    grid-column: span 2;
    display:flex;
    justify-content:center;
    gap:40px;
}

.full{
    grid-column: span 2;
}

button{
    grid-column: span 2;
    padding:14px;
    border:none;
    border-radius:30px;
    background: linear-gradient(45deg,var(--primary),var(--secondary));
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h2>EduElevate Registration</h2>

<form class="form-grid" id="studentForm">

<div class="form-group">
    <input type="text" name="name" required placeholder=" ">
    <label>Username</label>
</div>

<div class="form-group">
    <input type="password" name="password" required placeholder=" ">
    <label>Password</label>
</div>

<div class="form-group">
    <input type="number" name="age" required placeholder=" ">
    <label>Age</label>
</div>

<div class="form-group">
    <select name="course" required>
        <option value="">Select Course</option>
        <option>B.Tech</option>
        <option>BCA</option>
        <option>B.Sc</option>
        <option>MBA</option>
        <option>M.Tech</option>
    </select>
</div>

<div class="gender">
    <label><input type="radio" name="gender" value="Male" required> Male</label>
    <label><input type="radio" name="gender" value="Female"> Female</label>
    <label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<div class="form-group full">
    <textarea name="address" rows="3" required placeholder=" "></textarea>
    <label>Address</label>
</div>

<button type="submit">Register 🚀</button>

</form>

</div>

<script>
document.getElementById("studentForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = new FormData(this);

    const data = {
        name: formData.get("name"),
        password: formData.get("password"),
        age: formData.get("age"),
        course: formData.get("course"),
        gender: formData.get("gender"),
        address: formData.get("address")
    };

    try{
        const response = await fetch("http://localhost:5000/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        alert(result.message);
        this.reset();
    }
    catch(error){
        alert("Server not running or connection error");
    }
});
</script>

</body>
</html>
