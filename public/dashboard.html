<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EduElevate Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f4f6fb;margin:0;display:flex}
.sidebar{width:220px;background:#111827;color:white;height:100vh;padding:20px}
.sidebar h2{margin-bottom:30px}
.sidebar div{margin:15px 0;cursor:pointer}
.main{flex:1;padding:30px}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
button{background:#4f46e5;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer}
input{padding:6px;margin:5px 0}
.ai-btn{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#4f46e5;color:white;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}
#aiBox{position:fixed;bottom:90px;right:20px;width:300px;background:white;padding:15px;border-radius:10px;display:none;box-shadow:0 5px 15px rgba(0,0,0,0.2)}
#aiMessages{height:200px;overflow:auto;font-size:13px;margin-bottom:10px}
</style>
</head>

<body>

<div class="sidebar">
<h2>EduElevate</h2>
<div onclick="showSection('profile')">Profile</div>
<div onclick="showSection('assignments')">Assignments</div>
<div onclick="showSection('courses')">Courses</div>
<div onclick="showSection('attendance')">Attendance</div>
<div onclick="showSection('planner')">Planner</div>
<div onclick="logout()">Logout</div>
</div>

<div class="main">

<div id="profile" class="card">
<h3>Profile</h3>
<p>Name: <span id="name"></span></p>
<p>Course: <span id="course"></span></p>
<p>Year: <span id="year"></span></p>
</div>

<div id="assignments" class="card" style="display:none">
<h3>Assignments</h3>
<input id="aTitle" placeholder="Title">
<input id="aDesc" placeholder="Description">
<input id="aDate" type="date">
<button onclick="addAssignment()">Add</button>
<div id="assignmentList"></div>
</div>

<div id="courses" class="card" style="display:none">
<h3>My Courses</h3>
<input id="courseName" placeholder="Course Name">
<button onclick="addCourse()">Add</button>
<div id="courseList"></div>
</div>

<div id="attendance" class="card" style="display:none">
<h3>Attendance</h3>
<input id="subj" placeholder="Subject">
<input id="total" type="number" placeholder="Total Classes">
<input id="attended" type="number" placeholder="Attended">
<button onclick="addAttendance()">Save</button>
<div id="attendanceList"></div>
</div>

<div id="planner" class="card" style="display:none">
<h3>Planner</h3>
<input id="task" placeholder="Task">
<input id="taskDate" type="date">
<button onclick="addTask()">Add</button>
<div id="plannerList"></div>
</div>

</div>

<div class="ai-btn" onclick="toggleAI()">🤖</div>

<div id="aiBox">
<div id="aiMessages"></div>
<input id="aiInput" placeholder="Ask something...">
<button onclick="askAI()">Send</button>
</div>

<script>
const token = localStorage.getItem("token");
if(!token) location.href="login.html";

function authHeader(){
return { "Content-Type":"application/json","Authorization":"Bearer "+token };
}

async function loadProfile(){
const res = await fetch("http://localhost:5000/profile",{headers:authHeader()});
const user = await res.json();
document.getElementById("name").innerText=user.name;
document.getElementById("course").innerText=user.course;
document.getElementById("year").innerText=user.year;
}
loadProfile();

function showSection(id){
document.querySelectorAll(".card").forEach(c=>c.style.display="none");
document.getElementById(id).style.display="block";
}

/* ASSIGNMENTS */
async function addAssignment(){
await fetch("http://localhost:5000/assignments",{method:"POST",headers:authHeader(),
body:JSON.stringify({title:aTitle.value,description:aDesc.value,dueDate:aDate.value})});
loadAssignments();
}
async function loadAssignments(){
const res=await fetch("http://localhost:5000/assignments",{headers:authHeader()});
const data=await res.json();
assignmentList.innerHTML="";
data.forEach(a=>{
assignmentList.innerHTML+=`<div>${a.title} - ${a.dueDate.split("T")[0]} 
<button onclick="deleteAssignment('${a._id}')">X</button></div>`;
});
}
async function deleteAssignment(id){
await fetch("http://localhost:5000/assignments/"+id,{method:"DELETE",headers:authHeader()});
loadAssignments();
}
loadAssignments();

/* COURSES */
async function addCourse(){
await fetch("http://localhost:5000/courses",{method:"POST",headers:authHeader(),
body:JSON.stringify({name:courseName.value})});
loadCourses();
}
async function loadCourses(){
const res=await fetch("http://localhost:5000/courses",{headers:authHeader()});
const data=await res.json();
courseList.innerHTML="";
data.forEach(c=>{
courseList.innerHTML+=`<div>${c.name} 
<button onclick="deleteCourse('${c._id}')">X</button></div>`;
});
}
async function deleteCourse(id){
await fetch("http://localhost:5000/courses/"+id,{method:"DELETE",headers:authHeader()});
loadCourses();
}
loadCourses();

/* ATTENDANCE */
async function addAttendance(){
await fetch("http://localhost:5000/attendance",{method:"POST",headers:authHeader(),
body:JSON.stringify({subject:subj.value,totalClasses:total.value,attendedClasses:attended.value})});
loadAttendance();
}
async function loadAttendance(){
const res=await fetch("http://localhost:5000/attendance",{headers:authHeader()});
const data=await res.json();
attendanceList.innerHTML="";
data.forEach(a=>{
let percent=((a.attendedClasses/a.totalClasses)*100).toFixed(1);
attendanceList.innerHTML+=`<div>${a.subject} - ${percent}%</div>`;
});
}
loadAttendance();

/* PLANNER */
async function addTask(){
await fetch("http://localhost:5000/planner",{method:"POST",headers:authHeader(),
body:JSON.stringify({task:task.value,date:taskDate.value})});
loadPlanner();
}
async function loadPlanner(){
const res=await fetch("http://localhost:5000/planner",{headers:authHeader()});
const data=await res.json();
plannerList.innerHTML="";
data.forEach(t=>{
plannerList.innerHTML+=`<div>${t.task} - ${t.date.split("T")[0]} 
<button onclick="deleteTask('${t._id}')">X</button></div>`;
});
}
async function deleteTask(id){
await fetch("http://localhost:5000/planner/"+id,{method:"DELETE",headers:authHeader()});
loadPlanner();
}
loadPlanner();

/* AI */
function toggleAI(){
aiBox.style.display = aiBox.style.display==="block"?"none":"block";
}
async function askAI(){
const msg=aiInput.value;
aiMessages.innerHTML+=`<div><b>You:</b> ${msg}</div>`;
const res=await fetch("http://localhost:5000/ai",{method:"POST",headers:authHeader(),
body:JSON.stringify({message:msg})});
const data=await res.json();
aiMessages.innerHTML+=`<div><b>AI:</b> ${data.reply}</div>`;
aiInput.value="";
}

/* LOGOUT */
function logout(){
localStorage.removeItem("token");
location.href="login.html";
}
</script>

</body>
</html>
